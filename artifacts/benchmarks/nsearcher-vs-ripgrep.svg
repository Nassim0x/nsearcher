  <text x="700.0" y="94" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6d766f">116.8 ms</text>
  <line x1="905.0" y1="102" x2="905.0" y2="578" stroke="#d4cec3" stroke-width="1" />
  <text x="905.0" y="94" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6d766f">175.3 ms</text>
