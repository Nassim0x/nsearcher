  <text x="495.0" y="94" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6d766f">50.1 ms</text>
  <line x1="700.0" y1="102" x2="700.0" y2="578" stroke="#d4cec3" stroke-width="1" />
  <text x="700.0" y="94" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6d766f">100.1 ms</text>
  <line x1="905.0" y1="102" x2="905.0" y2="578" stroke="#d4cec3" stroke-width="1" />
  <text x="905.0" y="94" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6d766f">150.2 ms</text>
  <line x1="1110.0" y1="102" x2="1110.0" y2="578" stroke="#d4cec3" stroke-width="1" />
  <text x="1110.0" y="94" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6d766f">200.2 ms</text>
  <text x="40" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#223229">literal-huge-presence</text>
  <text x="40" y="169" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6b7280">ripgrep</text>
  <rect x="290" y="154" width="820.0" height="22" rx="7" fill="#9aa3b2" />
  <text x="1122.0" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#384152">200.2 ms</text>
  <text x="40" y="201" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#0b5d3a">NSearcher</text>
